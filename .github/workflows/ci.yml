name: API Gateway CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  SERVICE_NAME: frameforge-api-gateway
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ECR_REPOSITORY: frameforge-api-gateway

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: frameforge
          POSTGRES_PASSWORD: frameforge
          POSTGRES_DB: frameforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: frameforge
          RABBITMQ_DEFAULT_PASS: frameforge
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: frameforge-api-gateway

      - name: Checkout shared contracts
        uses: actions/checkout@v4
        with:
          repository: frameforgetech/frameforge-shared-contracts
          path: frameforge-shared-contracts
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build shared contracts
        run: |
          npm install
          npm run build
        working-directory: frameforge-shared-contracts

      - name: Install dependencies
        run: npm ci
        working-directory: frameforge-api-gateway

      - name: Lint code
        run: npm run lint --if-present
        working-directory: frameforge-api-gateway

      - name: Build service
        run: npm run build
        working-directory: frameforge-api-gateway

      - name: Run tests
        run: npm test --if-present
        working-directory: frameforge-api-gateway
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: frameforge
          DB_PASSWORD: frameforge
          DB_NAME: frameforge_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: frameforge
          RABBITMQ_PASSWORD: frameforge
          NODE_ENV: test

      - name: Generate test coverage
        run: npm run test:coverage --if-present
        working-directory: frameforge-api-gateway
        continue-on-error: true

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: frameforge-api-gateway

      - name: Checkout shared contracts
        uses: actions/checkout@v4
        with:
          repository: frameforgetech/frameforge-shared-contracts
          path: frameforge-shared-contracts
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: frameforge-api-gateway
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=frameforge-api-gateway
        continue-on-error: true

  version-and-tag:
    name: Generate Version and Tag
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        uses: actions/create-release@v1
        if: steps.tag_version.outputs.new_tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          release_name: API Gateway ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, version-and-tag]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: frameforge-api-gateway

      - name: Checkout shared contracts
        uses: actions/checkout@v4
        with:
          repository: frameforgetech/frameforge-shared-contracts
          path: frameforge-shared-contracts
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        if: vars.AWS_ACCOUNT_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        if: vars.AWS_ACCOUNT_ID != ''
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.version-and-tag.outputs.new_tag }}
            type=sha,prefix={{branch}}-

      - name: Extract metadata for ECR
        if: vars.AWS_ACCOUNT_ID != ''
        id: meta-ecr
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.version-and-tag.outputs.new_tag }}
            type=sha,prefix={{branch}}-

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frameforge-api-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Build and push to Amazon ECR
        if: vars.AWS_ACCOUNT_ID != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frameforge-api-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta-ecr.outputs.tags }}
          labels: ${{ steps.meta-ecr.outputs.labels }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --namespace=frameforge
          kubectl rollout status deployment/api-gateway --namespace=frameforge
